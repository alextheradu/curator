name: Deploy Curator

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: curator-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and restart production
    runs-on:
      - self-hosted
      - curator

    environment:
      name: production
      url: https://curatorfrc.com

    defaults:
      run:
        shell: bash
        working-directory: /srv/md0/robotics/curator

    steps:
      - name: Mark deployment checkout as safe
        run: git config --global --add safe.directory /srv/md0/robotics/curator

      - name: Update deployment checkout
        run: |
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "::error::Deployment checkout has tracked local changes. Commit or stash them before deploying."
            git status --short --untracked-files=no
            exit 1
          fi

          git fetch --tags origin main
          git checkout main
          git pull --ff-only --tags origin main

      - name: Install dependencies
        run: npm ci

      - name: Build and restart PM2
        run: npm run build
        env:
          RUNNER_TRACKING_ID: ""

      - name: Verify deployment health
        run: |
          node -e '
            const { execFileSync } = require("node:child_process");
            const processes = JSON.parse(execFileSync("pm2", ["jlist"], { encoding: "utf8" }));
            const curator = processes.find((process) => process.name === "curator");
            if (!curator) throw new Error("PM2 process curator was not found");
            if (curator.pm2_env?.status !== "online") {
              throw new Error(`PM2 process curator is ${curator.pm2_env?.status}`);
            }
          '

          curl --fail --silent --show-error --retry 10 --retry-delay 1 http://127.0.0.1:3145/ >/dev/null
