services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5437:5432"
    environment:
      POSTGRES_DB: curator
      POSTGRES_USER: curator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - curator_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curator -d curator"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - curator_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H \"api-key: $$QDRANT__SERVICE__API_KEY\" http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  curator_pg_data:
  curator_qdrant_data:
